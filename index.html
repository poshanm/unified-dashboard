<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no">

<title>Unified Dashboard</title>

<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f0f2f5;
    overflow: hidden;
}

/* Header */

.header {

    display: flex;

    background: #1f2937;

    height: 50px;

}

/* Buttons */

.tab-btn {

    flex: 1;

    border: none;

    cursor: pointer;

    font-size: 14px;

    background: #374151;

    color: white;

    font-weight: bold;

}

.tab-btn.active {

    background: #2563eb;

}

/* Frame area */

.frame-wrap {

    position: fixed;

    top: 50px;

    bottom: 0;

    left: 0;

    right: 0;

}

/* Iframes */

.frame {

    width: 100%;

    height: 100%;

    border: none;

    display: none;

}

.frame.active {

    display: block;

}

</style>

</head>

<body>

<div class="header">

<button
class="tab-btn"
onclick="go(0)">
OT Dashboard
</button>

<button
class="tab-btn"
onclick="go(1)">
SP5 Electrical
</button>

</div>

<div class="frame-wrap">

<iframe
id="f0"
class="frame"
src="https://poshanm.github.io/OT-dashboard_AI/">
</iframe>

<iframe
id="f1"
class="frame"
data-src="https://poshanm.github.io/sp5-electrical/">
</iframe>

</div>

<script>

/* Load last tab */

let lastTab =
localStorage.getItem("lastTab") || 0;

lastTab = Number(lastTab);

/* Track loaded */

let loaded = [true,false];

/* Switch function */

function go(i){

let frames =
document.querySelectorAll(".frame");

let buttons =
document.querySelectorAll(".tab-btn");

/* Lazy load */

if(!loaded[i]){

frames[i].src =
frames[i].dataset.src;

loaded[i] = true;

}

/* Show selected */

frames.forEach(f =>
f.classList.remove("active"));

buttons.forEach(b =>
b.classList.remove("active"));

frames[i]
.classList.add("active");

buttons[i]
.classList.add("active");

/* Save tab */

localStorage
.setItem("lastTab", i);

}

/* Auto open last tab */

window.onload = () => {

go(lastTab);

};

/* Register Service Worker */

if("serviceWorker" in navigator){

navigator.serviceWorker
.register("sw.js");

}

</script>

</body>
</html>
